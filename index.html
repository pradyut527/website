<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

header{
    background:#1e293b;
    padding:20px;
    text-align:center;
}

nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:#38bdf8;
}

.hero{
    text-align:center;
    padding:100px 20px;
}

button{
    padding:12px 25px;
    border:none;
    background:#38bdf8;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0ea5e9;
}

footer{
    text-align:center;
    padding:20px;
    background:#1e293b;
}
</style>

</head>

<body>

<header>
<h1>My Website</h1>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Projects</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h2>Welcome to My Website 🚀</h2>
<p>This site is hosted using GitHub Pages.</p>

<button onclick="showMessage()">Click Me</button>
</section>

<footer>
<p>© 2026 My Website</p>
</footer>

<script>
function showMessage(){
alert("Hello! Your website is working!");
}
</script>

</html>
